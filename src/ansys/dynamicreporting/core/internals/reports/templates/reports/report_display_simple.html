{% extends parent_template|default:"base_simple.html" %}
{% load static %}
{% block header %}
    {% if plotly == 0 %}
        <script src="{% static 'website/scripts/plotly.min.js' %}"></script>
    {% endif %}
    <link rel="stylesheet" type="text/css" href="{% static 'website/content/bootstrap-slider.min.css' %}"/>
    <script src="{% static 'website/scripts/geotiff.js' %}"></script>
    <script src="{% static 'website/scripts/geotiff_nexus.js' %}"></script>
{% endblock %}

{% block content %}
    <div id="report_root" class="container-fluid w-100" style="padding: 0; margin: 0;">
        {{ HTML|safe }}
    </div>
{% endblock %}

{% block scripts %}
    <script src="{% static 'website/scripts/bootstrap-slider.min.js' %}"></script>
    <script src="{% static 'website/scripts/panzoom.min.js' %}"></script>
    <script src="{% static 'website/scripts/report_item.js' %}"></script>
    <script src="{% static 'website/scripts/report_display.js' %}"></script>
{% endblock %}
