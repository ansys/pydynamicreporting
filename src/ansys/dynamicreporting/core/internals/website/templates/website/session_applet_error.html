{% extends "website/base_website.html" %}

{% block content %}

<h2 class="display-4 mb-3" xmlns="http://www.w3.org/1999/html">{{ base_title }}</h2>

<div class="container">
    <div class="bs-callout bs-callout-warning">
        <h4>Unable to launch applet</h4>
        <p>{{error}}</p><br>
        {% if target_url %}
        <a href="{{ target_url }}" download="{{ target_name }}">Download: {{ target_name }}</a>
        {% endif %}
    </div>
</div>

{% endblock %}
